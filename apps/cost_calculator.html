<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stromkosten Rechner</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <h1>⚡ Stromkosten Berechnen</h1>

    <div class="form-section">
        <div class="section-title">Stromverbrauchsrechner</div>
        <div class="input-group">
            <label for="leistung">Geräte Leistung in (W)</label>
            <input type="number" id="leistung" placeholder="z.B. 50" step="any">
        </div>
        <div class="input-group">
            <label for="betriebsdauer">Betriebsdauer in (h)</label>
            <input type="number" id="betriebsdauer" placeholder="z.B. 10" step="any">
        </div>
        <div class="input-group">
            <label for="strompreis">Preis pro kWh in (€)</label>
            <input type="number" id="strompreis" placeholder="z.B. 0.32" step="any">
        </div>
    </div>

    <button class="calculate-btn" onclick="calculate()">
        🧮 Berechnen
    </button>

    <div id="result">
        <div class="result-title">📊 Berechnungsergebnis</div>
        <div id="resultContent">
            <p id="resultVerbrauch"></p>
            <p id="resultPrice"></p>
        </div>
    </div>
</div>
<script src="../js/cost_calculator.js"></script>
<script src="../js/formater.js"></script>
</body>
</html>
